spring:
  cache:
    # Use in-memory cache for tests — avoids Redis dependency while still exercising
    # @Cacheable/@CacheEvict/@CachePut AOP behavior with real cache semantics.
    type: simple
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
